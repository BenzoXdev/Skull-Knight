services:
  skull-knight-server:
    image: ghcr.io/benzoXdev/skull-knight:latest
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.docker-cache/buildx
      cache_to:
        - type=local,dest=.docker-cache/buildx,mode=max
    container_name: skull-knight-server
    # Host networking: the container shares the host's network stack directly.
    # Every port the server binds (5173, SOCKS5 proxies, etc.) is accessible
    # on the host with zero overhead — no per-port proxy process.
    network_mode: host
    environment:
      # Optional username for first admin user
      - SKULL_KNIGHT_USER=admin
      # Leave these empty to auto-generate and persist to /app/data/save.json
      - SKULL_KNIGHT_PASS=
      - JWT_SECRET=
      - SKULL_KNIGHT_AGENT_TOKEN=
      # Server settings
      - PORT=5173
      - HOST=0.0.0.0
      # TLS paths (self-signed is auto-generated if not present)
      - SKULL_KNIGHT_TLS_CERT=/app/certs/server.crt
      - SKULL_KNIGHT_TLS_KEY=/app/certs/server.key
      - SKULL_KNIGHT_TLS_CA=
      # Set true only behind a trusted reverse proxy that terminates TLS (for example Render).
      # Default false keeps current behavior: Skull Knight terminates TLS in-process.
      - SKULL_KNIGHT_TLS_OFFLOAD=false
      # Cookie security mode: auto (default), true, or false.
      # auto: Secure cookie on HTTPS requests / X-Forwarded-Proto=https.
      - SKULL_KNIGHT_AUTH_COOKIE_SECURE=auto
      # Optional certbot integration (used only when NODE_ENV=production)
      - SKULL_KNIGHT_TLS_CERTBOT_ENABLED=false
      - SKULL_KNIGHT_TLS_CERTBOT_LIVE_PATH=/etc/letsencrypt/live
      - SKULL_KNIGHT_TLS_CERTBOT_DOMAIN=
      - SKULL_KNIGHT_TLS_CERTBOT_CERT_FILE=fullchain.pem
      - SKULL_KNIGHT_TLS_CERTBOT_KEY_FILE=privkey.pem
      - SKULL_KNIGHT_TLS_CERTBOT_CA_FILE=chain.pem
      - SKULL_KNIGHT_CLIENT_BUILD_CACHE_DIR=/app/client-build-cache
      - SKULL_KNIGHT_FILE_UPLOAD_INTENT_TTL_MS=1800000
      - SKULL_KNIGHT_FILE_UPLOAD_PULL_TTL_MS=1800000
    volumes:
      - skull-knight-data:/app/data
      - skull-knight-certs:/app/certs
      - skull-knight-client-build-cache:/app/client-build-cache
      # Uncomment to mount host certbot certs read-only
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # Uncomment to use a static config file instead of env vars
      # - ./skull-knight-server/config.json:/app/config.json:ro
    restart: unless-stopped
    healthcheck:
      # Use http:// when SKULL_KNIGHT_TLS_OFFLOAD=true.
      test: ["CMD-SHELL", "curl -f ${SKULL_KNIGHT_HEALTHCHECK_URL:-https://localhost:5173/health} >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  skull-knight-data:
  skull-knight-certs:
  skull-knight-client-build-cache:
